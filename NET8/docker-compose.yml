version: '3.8'

services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: bulkupload-sqlserver
    environment:
      ACCEPT_EULA: Y
      MSSQL_SA_PASSWORD: Passw0rd
      MSSQL_PID: Developer
    ports:
      - 1433:1433
    networks:
      - bulkupload-network

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: bulkupload-rabbitmq
    ports:
      - 5672:5672
      - 15672:15672
    networks:
      - bulkupload-network

  seaweedfs-master:
    image: chrislusf/seaweedfs
    container_name: bulkupload-seaweedfs-master
    command: master -ip=seaweedfs-master
    ports:
      - 9333:9333
    networks:
      - bulkupload-network

  seaweedfs-volume:
    image: chrislusf/seaweedfs
    container_name: bulkupload-seaweedfs-volume
    command: volume -mserver="seaweedfs-master:9333" -port=8080
    ports:
      - 8888:8080
    depends_on:
      - seaweedfs-master
    networks:
      - bulkupload-network

  auth-api:
    build:
      context: .
      dockerfile: src/Services/Auth/Auth.Api/Dockerfile
    container_name: bulkupload-auth-api
    ports:
      - 5101:8080
    environment:
      ASPNETCORE_URLS: http://+:8080
      Database__ConnectionString: Server=sqlserver;Database=bulkupload;User Id=sa;Password=Passw0rd;TrustServerCertificate=True;
    depends_on:
      - sqlserver
      - rabbitmq
    networks:
      - bulkupload-network

  control-api:
    build:
      context: .
      dockerfile: src/Services/Control/Control.Api/Dockerfile
    container_name: bulkupload-control-api
    ports:
      - 5102:8080
    environment:
      ASPNETCORE_URLS: http://+:8080
      Database__ConnectionString: Server=sqlserver;Database=bulkupload;User Id=sa;Password=Passw0rd;TrustServerCertificate=True;
      RabbitMQ__HostName: rabbitmq
      SeaweedFS__MasterUrl: http://seaweedfs-master:9333
    depends_on:
      - sqlserver
      - rabbitmq
      - seaweedfs-master
    networks:
      - bulkupload-network

  bulkload-worker:
    build:
      context: .
      dockerfile: src/Services/BulkLoad/BulkLoad.Worker/Dockerfile
    container_name: bulkupload-bulkload-worker
    environment:
      Database__ConnectionString: Server=sqlserver;Database=bulkupload;User Id=sa;Password=Passw0rd;TrustServerCertificate=True;
      RabbitMQ__HostName: rabbitmq
      SeaweedFS__MasterUrl: http://seaweedfs-master:9333
    depends_on:
      - sqlserver
      - rabbitmq
    networks:
      - bulkupload-network

  notifications-worker:
    build:
      context: .
      dockerfile: src/Services/Notifications/Notifications.Worker/Dockerfile
    container_name: bulkupload-notifications-worker
    environment:
      Database__ConnectionString: Server=sqlserver;Database=bulkupload;User Id=sa;Password=Passw0rd;TrustServerCertificate=True;
      RabbitMQ__HostName: rabbitmq
    depends_on:
      - sqlserver
      - rabbitmq
    networks:
      - bulkupload-network

networks:
  bulkupload-network:
    driver: bridge
